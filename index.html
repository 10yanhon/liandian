<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="shortcut icon" href="/favicon.png">
    <link rel="mask-icon" href="/favicon.svg" color="#5bbad5">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        (function () {
            const ua = navigator.userAgent || "";
            const isMobileUA = /android|iphone|ipad|ipod|mobile|blackberry|phone|opera mini|windows phone/i.test(ua);
            const isSmallScreen = typeof window.matchMedia === "function" && window.matchMedia("(max-width: 820px)").matches;
            const isMobile = isMobileUA || isSmallScreen;
            window.__SOLARA_IS_MOBILE = isMobile;
            if (!isMobile) {
                document.documentElement.classList.add("desktop-view");
                const desktopLink = document.createElement("link");
                desktopLink.rel = "stylesheet";
                desktopLink.href = "css/desktop.css";
                desktopLink.id = "desktopStylesheet";
                document.head.appendChild(desktopLink);
                return;
            }
            document.documentElement.classList.add("mobile-view");
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = "css/mobile.css";
            link.id = "mobileStylesheet";
            document.head.appendChild(link);
            const setViewportUnit = () => {
                const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                document.documentElement.style.setProperty("--mobile-vh", `${viewportHeight}px`);
            };

            const applyBodyClass = () => {
                if (document.body) {
                    document.body.classList.add("mobile-view");
                    setViewportUnit();
                }
            };
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", applyBodyClass, { once: true });
            } else {
                applyBodyClass();
            }

            window.addEventListener("resize", setViewportUnit);
            window.addEventListener("orientationchange", setViewportUnit);
            if (window.visualViewport) {
                window.visualViewport.addEventListener("resize", setViewportUnit);
                window.visualViewport.addEventListener("scroll", setViewportUnit);
            }

            setViewportUnit();
        })();
    </script>
    <style id="safari-ios-26-fix">
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        body {
            padding-left: max(env(safe-area-inset-left), 16px);
            padding-right: max(env(safe-area-inset-right), 16px);
        }
        @supports (height: 100dvh) {
            :root {
                --mobile-vh: 100dvh;
            }
        }
    </style>
    <script>
        (function fixMobileVH(){
            document.documentElement.style.setProperty("--mobile-vh", window.innerHeight + "px");
            window.addEventListener("resize", fixMobileVH);
            window.addEventListener("orientationchange", fixMobileVH);
        })();
    </script>

    <!-- 更新后的走马灯样式（浅玫瑰红 + 多条内容 + 修复版） -->
    <style>
        .marquee-container {
            width: 100%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.68);
            border-top: 1px solid rgba(255, 153, 204, 0.3);
            border-bottom: 1px solid rgba(255, 153, 204, 0.3);
            padding: 10px 0;
            position: relative;
            z-index: 15;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
        }

        .marquee-wrapper {
            display: flex;
            width: fit-content;
            animation: marquee-scroll 35s linear infinite;
            white-space: nowrap;
        }

        .marquee-item {
            display: inline-flex;
            align-items: center;
            padding: 0 40px;
            font-size: 16px;           /* 桌面端较大 */
            color: #ff99cc;            /* 浅玫瑰红 */
            font-weight: 500;
            text-shadow: 0 0 10px rgba(255, 153, 204, 0.75);
            letter-spacing: 0.6px;
        }

        /* 移动端字体稍小 */
        @media (max-width: 820px) {
            .marquee-item {
                font-size: 15px;
                padding: 0 30px;
            }
            .marquee-container {
                padding: 8px 0;
            }
        }

        .marquee-wrapper:hover {
            animation-play-state: paused;
        }

        @keyframes marquee-scroll {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-50%);
            }
        }
    </style>

</head>
