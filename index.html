<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>潘方音乐</title>
    <meta name="apple-mobile-web-app-title" content="潘方音乐">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="shortcut icon" href="/favicon.png">
    <link rel="mask-icon" href="/favicon.svg" color="#5bbad5">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        (function () {
            const ua = navigator.userAgent || "";
            const isMobileUA = /android|iphone|ipad|ipod|mobile|blackberry|phone|opera mini|windows phone/i.test(ua);
            const isSmallScreen = typeof window.matchMedia === "function" && window.matchMedia("(max-width: 820px)").matches;
            const isMobile = isMobileUA || isSmallScreen;
            window.__SOLARA_IS_MOBILE = isMobile;
            if (!isMobile) {
                document.documentElement.classList.add("desktop-view");
                const desktopLink = document.createElement("link");
                desktopLink.rel = "stylesheet";
                desktopLink.href = "css/desktop.css";
                desktopLink.id = "desktopStylesheet";
                document.head.appendChild(desktopLink);
                return;
            }
            document.documentElement.classList.add("mobile-view");
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = "css/mobile.css";
            link.id = "mobileStylesheet";
            document.head.appendChild(link);
            const setViewportUnit = () => {
                const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                document.documentElement.style.setProperty("--mobile-vh", `${viewportHeight}px`);
            };

            const applyBodyClass = () => {
                if (document.body) {
                    document.body.classList.add("mobile-view");
                    setViewportUnit();
                }
            };
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", applyBodyClass, { once: true });
            } else {
                applyBodyClass();
            }

            window.addEventListener("resize", setViewportUnit);
            window.addEventListener("orientationchange", setViewportUnit);
            if (window.visualViewport) {
                window.visualViewport.addEventListener("resize", setViewportUnit);
                window.visualViewport.addEventListener("scroll", setViewportUnit);
            }

            setViewportUnit();
        })();
    </script>
    <style id="safari-ios-26-fix">
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        body {
            padding-left: max(env(safe-area-inset-left), 16px);
            padding-right: max(env(safe-area-inset-right), 16px);
        }
        @supports (height: 100dvh) {
            :root {
                --mobile-vh: 100dvh;
            }
        }
    </style>
    <script>
        (function fixMobileVH(){
            document.documentElement.style.setProperty("--mobile-vh", window.innerHeight + "px");
            window.addEventListener("resize", fixMobileVH);
            window.addEventListener("orientationchange", fixMobileVH);
        })();
    </script>

    <!-- 走马灯样式（已优化桌面端全宽滚动 + 无背景色） -->
    <style>
        .marquee-container {
            width: 100%;
            overflow: hidden;
            padding: 10px 0;
            position: relative;
            z-index: 15;
        }

        .marquee {
            display: inline-block;
            white-space: nowrap;
            font-size: 15px;
            color: #a1f5c9;
            font-weight: 400;
            padding-left: 100%;
            animation: marquee 30s linear infinite;
            text-shadow: 0 0 10px rgba(161, 245, 201, 0.8);
            letter-spacing: 0.6px;
        }

        .marquee:hover {
            animation-play-state: paused;
        }

        @keyframes marquee {
            from { transform: translateX(0); }
            to   { transform: translateX(-100%); }
        }

        /* 桌面端优化：全宽、稍大字体、更流畅 */
        .desktop-view .marquee-container {
            padding: 12px 0;
        }
        .desktop-view .marquee {
            font-size: 16px;
            padding-left: 120%;   /* 确保从屏幕最右边开始滚动 */
        }

        /* 移动端适配 */
        @media (max-width: 820px) {
            .marquee-container {
                padding: 8px 0;
            }
            .marquee {
                font-size: 14px;
            }
        }
    </style>

</head>
<body>
    <div class="background-stage" id="backgroundStage" aria-hidden="true">
        <div class="background-stage__layer background-stage__layer--base" id="backgroundBaseLayer"></div>
        <div class="background-stage__layer background-stage__layer--transition" id="backgroundTransitionLayer"></div>
    </div>
    <div class="container" id="mainContainer">
        <div class="mobile-toolbar" id="mobileToolbar" role="toolbar">
            <button class="mobile-toolbar__button" id="mobileExploreButton" type="button" aria-label="探索雷达">
                <i class="fas fa-satellite-dish" aria-hidden="true"></i>
            </button>
            <div class="mobile-toolbar__title" id="mobileToolbarTitle">潘方音乐</div>
            <div class="mobile-toolbar__actions">
                <button class="mobile-toolbar__button" id="mobileSearchToggle" type="button" aria-label="打开搜索">
                    <i class="fas fa-search" aria-hidden="true"></i>
                </button>
            </div>
        </div>
        <div class="header">
            <h1>潘方音乐</h1>
            <div class="warning">Made by Wet Dream Boy，免费API来自GD音乐台(music.gdstudio.xyz)，仅供学习交流使用，请支持正版音乐奥！</div>
            <div class="theme-switch-wrapper">
                <button id="themeToggleButton" class="theme-toggle-button" type="button" aria-label="切换深浅色模式">
                    <i class="fas fa-sun theme-icon theme-icon--sun" aria-hidden="true"></i>
                    <i class="fas fa-moon theme-icon theme-icon--moon" aria-hidden="true"></i>
                </button>
            </div>
        </div>

        <!-- 走马灯：放在 header 下方，搜索区域上方 -->
        <div class="marquee-container">
            <div class="marquee" id="marquee">
                🔥 欢迎使用潘方音乐 · 支持正版音乐 · 免费学习交流使用 · 音乐让生活更美好！❤️ 如有问题欢迎反馈 · 每天听好歌，从这里开始 ~
            </div>
        </div>

        <div class="search-area" id="searchArea">
            <button type="button" class="mobile-close-btn" id="mobileSearchClose" aria-label="关闭搜索">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索歌曲、歌手或专辑...">
                <div class="source-select-wrapper" id="sourceSelectWrapper">
                    <button id="sourceSelectButton" class="source-select-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
                        <span id="sourceSelectLabel">网易云音乐</span>
                        <i class="fas fa-chevron-down caret-icon" aria-hidden="true"></i>
                    </button>
                    <div id="sourceMenu" class="source-menu" role="listbox" aria-labelledby="sourceSelectButton"></div>
                </div>
                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-search"></i>
                    <span>搜索</span>
                </button>
            </div>
            <div id="searchResults" class="search-results">
                <div class="search-results-toolbar">
                    <div class="import-dropdown">
                        <button id="importSelectedBtn" class="import-selected-btn" type="button" disabled aria-haspopup="menu" aria-expanded="false">
                            <i class="fas fa-file-import" aria-hidden="true"></i>
                            <span class="import-selected-label">导入已选</span>
                            <span id="importSelectedCount" class="import-selected-count" aria-hidden="true"></span>
                            <i class="fas fa-caret-down import-dropdown-caret" aria-hidden="true"></i>
                        </button>
                        <div class="import-dropdown-menu" id="importSelectedMenu" role="menu" hidden>
                            <button id="importToPlaylist" class="import-dropdown-item" type="button" role="menuitem">导入到播放列表</button>
                            <button id="importToFavorites" class="import-dropdown-item" type="button" role="menuitem">导入到收藏列表</button>
                        </div>
                    </div>
                </div>
                <div id="searchResultsList" class="search-results-list"></div>
            </div>
        </div>

        <!-- 以下为原有的 main-content、controls 等内容（保持不变） -->
        <div class="main-content">
            <div class="cover-area">
                <div class="mobile-turntable" id="mobileTurntable">
                    <div class="mobile-turntable__platter">
                        <div class="album-cover" id="albumCover">
                            <div class="placeholder">
                                <i class="fas fa-music"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mobile-inline-lyrics" id="mobileInlineLyrics" aria-hidden="true">
                    <div class="mobile-inline-lyrics__hint">
                        <i class="fas fa-arrow-left"></i>
                        轻触返回封面
                    </div>
                    <div class="mobile-inline-lyrics__scroll" id="mobileInlineLyricsScroll">
                        <div class="mobile-inline-lyrics__content" id="mobileInlineLyricsContent"></div>
                    </div>
                </div>
                <div class="current-song-info">
                    <div class="current-song-title-row">
                        <span class="current-song-title" id="currentSongTitle">选择一首歌曲开始播放</span>
                        <button class="favorite-toggle current-favorite-btn" id="currentFavoriteToggle" type="button" aria-label="收藏当前歌曲" title="收藏当前歌曲">
                            <i class="far fa-heart" aria-hidden="true"></i>
                        </button>
                    </div>
                    <div class="current-song-artist" id="currentSongArtist">未知艺术家</div>
                    <button class="mobile-quality-chip" id="mobileQualityToggle" type="button" aria-haspopup="menu" aria-expanded="false">
                        <span id="mobileQualityLabel">极高音质</span>
                        <i class="fas fa-chevron-down" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div class="mobile-panel" id="mobilePanel">
                <!-- 面板内容省略（与你原文件一致） -->
                <!-- ...（保持你原来的 mobile-panel 全部内容）... -->
            </div>
        </div>

        <div class="controls">
            <!-- controls 内容保持原样 -->
            <!-- ...（保持你原来的 controls 全部内容）... -->
        </div>
    </div>

    <div class="mobile-overlay-scrim" id="mobileOverlayScrim"></div>
    <audio id="audioPlayer" preload="metadata" playsinline></audio>

    <div id="notification" class="notification"></div>
    <div id="debugInfo" class="debug-info"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/index.js"></script>
    <script>
        if (window.__SOLARA_IS_MOBILE) {
            const mobileScript = document.createElement('script');
            mobileScript.src = 'js/mobile.js';
            mobileScript.async = false;
            mobileScript.defer = false;
            document.body.appendChild(mobileScript);
        }
    </script>
</body>
</html>
